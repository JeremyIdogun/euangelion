<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="title desc">
<title>Besorah logo</title>
<desc>Open book with radiant cross and the word Besorah with Hebrew subtitle בְּשׂוֹרָה.</desc>

<defs>
  <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F4D35E"/>
    <stop offset="100%" stop-color="#D4A017"/>
  </linearGradient>
  <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFFDF7"/>
    <stop offset="100%" stop-color="#F8E8BE"/>
  </linearGradient>
  <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

